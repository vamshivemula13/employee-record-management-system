<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Record Management System</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Employee Record Management System</span>
</div>
</nav>

<div class="container mt-4">

<!-- Dashboard -->
<div class="dashboard">
<h4>Total Employees: <span id="employeeCount">0</span></h4>
</div>

<!-- Add Employee Form -->
<div class="card mt-4">
<div class="card-body">

<h4>Add Employee</h4>

<input id="name" class="form-control mt-2" placeholder="Employee Name">
<input id="email" class="form-control mt-2" placeholder="Email">
<input id="department" class="form-control mt-2" placeholder="Department">
<input id="salary" class="form-control mt-2" placeholder="Salary">
<input id="phone" class="form-control mt-2" placeholder="Phone Number">

<button onclick="addEmployee()" class="btn btn-primary mt-3">
Add Employee
</button>

</div>
</div>

<!-- Employee List -->
<div class="card mt-4">
<div class="card-body">

<h4>Employee List</h4>

<input
type="text"
id="searchInput"
class="form-control mt-2"
placeholder="Search employee..."
onkeyup="searchEmployee()">

<table class="table table-striped mt-3">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Salary</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>

</table>

</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
